<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Приложение встраивается в Тильду; прямую страницу не индексируем (и не светим секретный адрес полной версии в поиске). -->
    <meta name="robots" content="noindex, nofollow" />
    <script>
      (function () {
        try {
          var u = new URLSearchParams(location.search).get('theme');
          var t = (u === 'dark' || u === 'light') ? u : localStorage.getItem('jm-theme');
          if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
    <title>JetMetrics — Карта метрик</title>
    <meta name="description" content="Интерактивный атлас метрик по отраслям: что на что влияет, прямо или обратно, и на что можно повлиять." />
    <link rel="stylesheet" href="https://jetmetrics-static.storage.yandexcloud.net/layout/fonts.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
