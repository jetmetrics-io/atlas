name: Deploy to GitHub Pages + Yandex bucket

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Ключи сервисного аккаунта static-deploy (S3-совместимый доступ к бакету).
    # Пока секретов нет — шаг заливки в бакет пропускается (см. if ниже), CI зелёный.
    env:
      YC_KEY_ID: ${{ secrets.YC_KEY_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET }}
      AWS_DEFAULT_REGION: ru-central1
      YC_ENDPOINT: https://storage.yandexcloud.net
      YC_BUCKET: jetmetrics-static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # ОДНА сборка (было: две — free/full по секретному адресу). Гейт полной версии —
      # внутри приложения по факту оплаты (email → paid.json ∪ allowlist.json). Данные
      # лежат в dist/data/*.json и грузятся приложением по fetch: full — только оплатившим.
      - name: Build (одна сборка, гейт внутри приложения)
        run: |
          rm -rf site && mkdir -p site
          npm run build
          cp -r dist/. site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      # Автосинк в бакет Яндекса. site/ → s3://jetmetrics-static/atlas/.
      #   js/css/шрифты — max-age=31536000,immutable ; html и data/*.json — max-age=300.
      # --delete чистит устаревшие объекты под atlas/ (в т.ч. старый pro-3c35f475c4/,
      # когда ставим секреты — это ЖДЁТ репойнта iframe'ов Марией, см. site-state/HANDOFF).
      - name: Sync to Yandex Object Storage
        if: ${{ env.YC_KEY_ID != '' }}
        run: |
          # статика — иммутабельно на год (кроме html и json)
          aws s3 sync site/ "s3://${YC_BUCKET}/atlas/" \
            --endpoint-url "${YC_ENDPOINT}" \
            --acl public-read --delete \
            --exclude "*.html" --exclude "*.json" \
            --cache-control "max-age=31536000,immutable"
          # html — короткий кэш
          aws s3 sync site/ "s3://${YC_BUCKET}/atlas/" \
            --endpoint-url "${YC_ENDPOINT}" \
            --acl public-read \
            --exclude "*" --include "*.html" \
            --cache-control "max-age=300" --content-type "text/html; charset=utf-8"
          # данные (data/*.json) — короткий кэш, обновляются при изменении карт/бесплатного набора
          aws s3 sync site/ "s3://${YC_BUCKET}/atlas/" \
            --endpoint-url "${YC_ENDPOINT}" \
            --acl public-read \
            --exclude "*" --include "*.json" \
            --cache-control "max-age=300" --content-type "application/json; charset=utf-8"
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
