name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Собираем обе версии в один артефакт:
      #   free (3 карты) → корень /atlas/ (открытый адрес, идёт в /hub-atlas)
      #   full (28 карт) → /atlas/pro-3c35f475c4/ (неугадываемый адрес, в закрытую /hub-atlas-pro)
      - name: Build free (root) + full (secret path)
        run: |
          rm -rf site && mkdir -p site
          npm run build:free
          cp -r dist/. site/
          npm run build:full
          mkdir -p "site/pro-3c35f475c4"
          cp -r dist/. "site/pro-3c35f475c4/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
